<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Backroll</title>

    <link rel="stylesheet" href="./backroll.css">
    <script src="./backroll.js" defer></script>
</head>

<body>

    <main>

        <form id="project-form">

            <label for="name">Project name</label>
            <input
                id="name"
                name="name"
                type="text"
                autocomplete="off"
                required
            >

            <label for="type">Type</label>
            <select id="type" name="type" required>
                <option value="dev">Dev</option>
                <option value="music">Music</option>
            </select>

            <label for="date">Date</label>
            <input
                id="date"
                name="date"
                type="date"
                required
            >

            <div class="form-actions">
                <button id="submit-button" type="submit">
                    Add
                </button>
                <button id="cancel-button" type="button" hidden>
                    Cancel
                </button>
            </div>

        </form>

        <p id="status" role="status" aria-live="polite"></p>

        <section aria-labelledby="json-input-heading">
            <h1 id="json-input-heading">Import JSON</h1>
            <label for="json-file">
                Choose a project database
            </label>
            <input
                id="json-file"
                type="file"
                accept=".json,application/json"
            >
        </section>

        <section aria-labelledby="database-heading">
            <h1 id="database-heading">Project database</h1>
            <div id="database-list"></div>
        </section>

        <section aria-labelledby="save-heading">
            <h2 id="save-heading">Save JSON file</h2>
            <label for="save-filename">File name</label>
            <input
                id="save-filename"
                type="text"
                value="projects.json"
                autocomplete="off"
            >
            <button id="save-json-button" type="button">
                Save file
            </button>
        </section>

        <section aria-labelledby="json-heading">
            <h2 id="json-heading">JSON preview</h2>
            <pre id="output"></pre>
        </section>

    </main>

</body>
</html>
